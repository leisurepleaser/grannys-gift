<!doctype html>

  <header class="site-header" aria-label="Main site header">
    <div class="site-header__inner">
      <div class="site-header__bar">
        <a href="/" class="site-wordmark" aria-label="Granny's Gift home">
          <span class="site-wordmark__line">
            <span class="site-wordmark__main">Granny’s Gift</span>
            <span class="site-wordmark__tm">™</span>
          </span>
          <span class="site-wordmark__tagline">A Living Legacy</span>
        </a>

        <button
          type="button"
          class="menu-toggle"
          id="menuToggle"
          aria-expanded="false"
          aria-controls="headerMenu"
          aria-label="Open navigation menu"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>

        <div class="site-header__menu" id="headerMenu">
          <nav class="site-nav" aria-label="Primary navigation">
            <a href="/our-story/" class="site-nav__link">OUR STORY</a>

          </nav>

          <div class="site-social" aria-label="Social media">
            <button type="button" class="site-social__link" aria-label="Instagram">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="3.5" y="3.5" width="17" height="17" rx="5"></rect>
                <circle cx="12" cy="12" r="4"></circle>
                <circle cx="17.2" cy="6.8" r="1"></circle>

            <button type="button" class="site-social__link" aria-label="Facebook">

            <button type="button" class="site-social__link" aria-label="TikTok">

                <path d="M14.7 3.5c.4 1.1 1.1 2 2 2.6.8.6 1.8 1 2.8 1v2.8c-1.3 0-2.6-.3-3.8-.9v5.6c0 3.2-2.4 5.4-5.6 5.4-3 0-5.4-2.2-5.4-5.1 0-3.1 2.6-5.4 5.8-5.1v2.9c-1.4-.2-2.8.7-2.8 2.2 0 1.3 1 2.3 2.4 2.3 1.5 0 2.4-1.1 2.4-2.7V3.5h2.2Z"></path>

            <button type="button" class="site-social__link" aria-label="Pinterest">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 3.2c-4.8 0-7.2 3.4-7.2 6.9 0 1.9.7 3.7 2.2 4.3.2.1.3 0 .4-.2 0-.2.2-.8.3-1 .1-.2 0-.3-.1-.5-.4-.6-.7-1.5-.7-2.6 0-2.5 1.9-4.8 5-4.8 2.7 0 4.2 1.7 4.2 3.9 0 2.9-1.3 5.4-3.2 5.4-1.1 0-1.8-.9-1.6-2 .3-1.3.8-2.7.8-3.6 0-.8-.4-1.5-1.3-1.5-1 0-1.8 1.1-1.8 2.5 0 .9.3 1.6.3 1.6l-1.2 5.1c-.3 1.1 0 2.4.1 3.2.1.1.2.1.2 0 .1-.2 1.2-1.6 1.5-2.9l.4-1.6c.4.7 1.4 1.3 2.6 1.3 3.5 0 5.8-3.2 5.8-7.4 0-3.1-2.7-6-6.7-6Z"></path>

  <main class="site-main">
    <section class="page-shell">
      <section class="page-hero">
        <h1 class="page-title">Soda Pop Cake</h1>
      </section>

      <figure class="page-feature">
        <button
          type="button"
          class="gallery-open"
          data-image="/images/christmas_cake.JPG"
          data-alt="Granny’s Gift whole 10-inch cake arranged for Christmas"
          aria-label="Expand soda pop cake feature image"
        >
          <img
            src="/images/christmas_cake.JPG"
            alt="Granny’s Gift whole 10-inch cake arranged for Christmas"
          >
        </button>
      </figure>

      <div class="gallery-grid gallery-grid--products">
        <button
          type="button"
          class="gallery-open"
          data-image="/images/cake_whole_stand.jpg"
          data-alt="Whole Granny’s Gift soda pop cake on a stand"
          aria-label="Expand whole cake photo"
        >
          <img
            src="/images/cake_whole_stand.jpg"
            alt="Whole Granny’s Gift soda pop cake on a stand"
          >
        </button>

        <button
          type="button"
          class="gallery-open"
          data-image="/images/cake_slice_hero.jpg"
          data-alt="Slice of Granny’s Gift soda pop cake on a plate"
          aria-label="Expand cake slice photo"
        >
          <img
            src="/images/cake_slice_hero.jpg"
            alt="Slice of Granny’s Gift soda pop cake on a plate"
          >
        </button>

        <button
          type="button"
          class="gallery-open"
          data-image="/images/cake_slice_above.jpg"
          data-alt="Slice of Granny’s Gift soda pop cake photographed from above"
          aria-label="Expand overhead cake slice photo"
        >
          <img
            src="/images/cake_slice_above.jpg"
            alt="Slice of Granny’s Gift soda pop cake photographed from above"
          >
        </button>

        <button
          type="button"
          class="gallery-open"
          data-image="/images/snack_cakes.jpg"
          data-alt="Packaged Granny’s Gift snack cakes"
          aria-label="Expand snack cakes photo"
        >
          <img
            src="/images/snack_cakes.jpg"
            alt="Packaged Granny’s Gift snack cakes"
          >
        </button>

        <button
          type="button"
          class="gallery-open"
          data-image="/images/christmas_snack_cakes.JPG"
          data-alt="Holiday snack cakes arranged on a decorative plate"
          aria-label="Expand holiday snack cakes photo"
        >
          <img
            src="/images/christmas_snack_cakes.JPG"
            alt="Holiday snack cakes arranged on a decorative plate"
          >
        </button>
      </div>
    </section>
  </main>

  <footer class="wrap footer-note">
    <p class="muted">grannysgiftinc@gmail.com • Sea-Tac / South Seattle</p>
  </footer>

  <div id="lightbox" class="lightbox" hidden aria-hidden="true">
    <button type="button" class="lightbox-close" aria-label="Close image viewer">×</button>
    <img id="lightbox-image" class="lightbox-image" src="" alt="">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="/script.js"></script>
